<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>WMS — Inwentaryzacja</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Inwentaryzacja</h1>
    <input type="text" id="input-operator" placeholder="Operator">
  </header>

  <main>
    <div id="komunikat" class="komunikat hidden"></div>

    <section id="krok-magazyn" class="krok">
      <h2>1. Wybierz magazyn</h2>
      <div id="magazyny-lista" class="lista-wyboru"></div>
    </section>

    <section id="krok-lokalizacja" class="krok hidden">
      <h2>2. Skanuj lokalizację</h2>
      <div id="spis-info" class="artykul-info"></div>
      <input type="text" id="input-lokalizacja" autocomplete="off" placeholder="Skanuj etykietę lokalizacji" autofocus>
    </section>

    <section id="krok-pozycje" class="krok hidden">
      <h2>3. <span id="pozycje-lokalizacja-kod"></span></h2>
      <div id="pozycje-lista" class="lista-wyboru"></div>
      <input type="text" id="input-sku" autocomplete="off" placeholder="Skanuj SKU / EAN towaru">
      <p class="hint">...albo zeskanuj etykietę innej lokalizacji</p>
      <button type="button" id="btn-zmien-lokalizacje" class="btn-pomocniczy">Zmień lokalizację</button>
    </section>

    <section id="krok-ilosc" class="krok hidden">
      <h2>4. Ile sztuk?</h2>
      <div id="ilosc-info" class="artykul-info"></div>
      <div class="pole-etykieta">
        <label for="input-ilosc-spis">Policzona ilość</label>
        <input type="number" id="input-ilosc-spis" inputmode="decimal" min="0" step="any">
      </div>
      <button type="button" id="btn-zapisz-ilosc" class="btn-glowny">Zapisz</button>
      <button type="button" id="btn-anuluj-ilosc" class="btn-pomocniczy">Anuluj</button>
    </section>

    <section id="krok-raport" class="krok hidden">
      <h2>Raport różnic</h2>
      <div id="raport-podsumowanie" class="artykul-info"></div>
      <div id="raport-lista"></div>

      <div id="raport-potwierdzenie" class="potwierdzenie hidden">
        <p id="raport-potwierdzenie-tekst" class="hint"></p>
        <button type="button" id="btn-raport-zamknij-tak" class="btn-glowny">Tak, zamknij spis</button>
        <button type="button" id="btn-raport-zamknij-nie" class="btn-pomocniczy">Anuluj</button>
      </div>

      <button type="button" id="btn-zamknij-spis" class="btn-glowny">Zamknij spis</button>
      <button type="button" id="btn-powrot-raport" class="btn-pomocniczy">Wróć do skanowania</button>
    </section>

    <button type="button" id="btn-raport" class="btn-pomocniczy hidden">Raport / zakończ spis</button>
    <button type="button" id="btn-reset" class="btn-pomocniczy hidden">Inny magazyn</button>
  </main>

  <script src="karta-produktu.js"></script>
  <script src="inwentaryzacja.js"></script>
</body>
</html>
