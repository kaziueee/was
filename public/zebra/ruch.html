<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0d2f5b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>WMS — Ruch towaru</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <!-- WIDOK MENU (SPA: bez przeladowania - pelny ekran sie trzyma) -->
  <div id="widok-menu" class="ekran">
    <header class="ekran-naglowek"><div class="ekran-sku"><h1>WMS</h1></div></header>
    <main class="ekran-tresc">
      <button type="button" id="btn-go-ruch" class="btn-menu">Ruch towaru<span>MM / zmiana lokalizacji</span></button>
      <a class="btn-menu" href="produkty.html">Test wyszukiwania (GT)<span>podgląd karty produktu</span></a>
      <button type="button" id="btn-pelny-ekran" class="btn-menu btn-menu-2">⛶ Tryb pełnoekranowy</button>
    </main>
  </div>

  <!-- WIDOK RUCH -->
  <div id="widok-ruch" class="hidden">
  <div class="ekran">

    <!-- naglowek dynamiczny (ruch.js): start = tytul; produkt = SKU+nazwa+stan+kontekst -->
    <header class="ekran-naglowek" id="ekran-naglowek"></header>

    <main class="ekran-tresc">
      <div id="komunikat" class="komunikat hidden"></div>

      <!-- krok 1: skan -->
      <section id="krok-start">
        <h2 class="ekran-tytul">Skanuj SKU lub lokalizację</h2>
        <div class="pole-skan">
          <input type="text" id="input-start" inputmode="none" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Skanuj lub wpisz kod" autofocus>
        </div>
      </section>

      <!-- krok 2: wybor -->
      <section id="krok-wybor" class="hidden">
        <div id="wybor-naglowek" class="karta-info"></div>
        <h2 id="wybor-tytul" class="ekran-tytul hidden"></h2>
        <div id="wybor-podsumowanie" class="podsumowanie-stanu hidden"></div>
        <div class="pole-blok">
          <label class="pole-etykieta hidden" id="wybor-skan-etykieta" for="input-wybor-skan"></label>
          <div class="pole-skan">
            <input type="text" id="input-wybor-skan" inputmode="none" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Skanuj lub wpisz">
          </div>
          <p class="pole-hint" id="wybor-hint"></p>
        </div>
        <label class="pole-checkbox hidden" id="checkbox-ukryj-zero-wrap">
          <input type="checkbox" id="checkbox-ukryj-zero">
          Ukryj produkty bez stanu (K4/K4G/MAG/LS)
        </label>
        <div id="lista-wyboru" class="lista"></div>
      </section>

      <!-- krok 3: dokad i ile -->
      <section id="krok-cel" class="hidden">
        <div id="cel-magazyn-pole" class="pole-blok">
          <label class="pole-etykieta" for="select-cel-magazyn">Cel</label>
          <select id="select-cel-magazyn" class="pole-select"></select>
        </div>

        <div id="cel-lokalizacja-pole" class="pole-blok">
          <label class="pole-etykieta" for="input-cel">Lokalizacja docelowa</label>
          <div class="pole-skan">
            <input type="text" id="input-cel" inputmode="none" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Skanuj lub wpisz lokalizację">
          </div>
          <p id="cel-lokalizacja-hint" class="pole-hint"></p>
        </div>

        <div class="pole-blok">
          <label class="pole-etykieta" for="input-ilosc">Ilość</label>
          <div class="stepper">
            <button type="button" id="btn-ilosc-minus" aria-label="Mniej">−</button>
            <input type="number" id="input-ilosc" class="stepper-wartosc" inputmode="numeric" min="0" step="any">
            <button type="button" id="btn-ilosc-plus" aria-label="Więcej">+</button>
          </div>
          <p id="pozostanie" class="pozostanie hidden"></p>
        </div>

        <div id="cel-potwierdzenie" class="potwierdzenie hidden">
          <p id="cel-potwierdzenie-tekst" class="hint"></p>
          <button type="button" id="btn-cel-utworz-tak" class="btn-akcja">Tak, utwórz lokalizację</button>
          <button type="button" id="btn-cel-utworz-nie" class="btn-wstecz">Anuluj</button>
        </div>
      </section>
    </main>

    <footer class="ekran-stopka">
      <button type="button" id="btn-wstecz" class="btn-wstecz">← Wstecz</button>
      <button type="button" id="btn-zatwierdz" class="btn-akcja hidden">Zatwierdź</button>
    </footer>

    <div id="sukces-overlay" class="sukces-overlay hidden">
      <div class="sukces-box">
        <div class="sukces-ikona">✓</div>
        <p id="sukces-tekst"></p>
        <p class="sukces-hint">Dotknij, aby kontynuować</p>
      </div>
    </div>
  </div>
  </div><!-- /widok-ruch -->

  <script src="fullscreen.js"></script>
  <script src="karta-produktu.js"></script>
  <script src="kreator.js"></script>
  <script src="ruch.js"></script>
</body>
</html>
