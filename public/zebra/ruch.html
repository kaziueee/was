<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>WMS — Ruch towaru</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Ruch towaru</h1>
    <input type="text" id="input-operator" placeholder="Operator">
  </header>

  <main>
    <div id="komunikat" class="komunikat hidden"></div>

    <section id="krok-start" class="krok">
      <h2>Skanuj SKU lub lokalizację</h2>
      <input type="text" id="input-start" autocomplete="off" inputmode="none" placeholder="Zeskanuj SKU lub lokalizację" autofocus>
    </section>

    <section id="krok-wybor" class="krok hidden">
      <h2>Wybór</h2>
      <div id="wybor-naglowek" class="artykul-info"></div>
      <input type="text" id="input-wybor-skan" autocomplete="off" inputmode="none">
      <p class="hint" id="wybor-hint"></p>
      <label class="pole-checkbox hidden" id="checkbox-ukryj-zero-wrap">
        <input type="checkbox" id="checkbox-ukryj-zero">
        Ukryj produkty bez stanu (K4/K4G/MAG/LS)
      </label>
      <div id="lista-wyboru" class="lista-wyboru"></div>
    </section>

    <section id="krok-cel" class="krok hidden">
      <h2>Dokąd i ile?</h2>
      <div id="cel-podsumowanie" class="artykul-info"></div>

      <div id="cel-magazyn-pole" class="pole-etykieta">
        <label for="select-cel-magazyn">Cel</label>
        <select id="select-cel-magazyn"></select>
      </div>

      <div class="pole-etykieta">
        <label for="input-ilosc">Ilość</label>
        <input type="number" id="input-ilosc" inputmode="decimal" min="0" step="any">
        <span id="pozostanie" class="pozostanie hidden"></span>
      </div>

      <div id="cel-lokalizacja-pole" class="pole-etykieta">
        <label for="input-cel">Lokalizacja docelowa</label>
        <input type="text" id="input-cel" autocomplete="off" inputmode="none" placeholder="Skanuj lokalizację docelową">
        <p id="cel-lokalizacja-hint" class="hint"></p>
      </div>

      <div id="cel-potwierdzenie" class="hidden">
        <p id="cel-potwierdzenie-tekst" class="hint"></p>
        <button type="button" id="btn-cel-utworz-tak" class="btn-glowny">Tak, utwórz lokalizację</button>
        <button type="button" id="btn-cel-utworz-nie" class="btn-pomocniczy">Anuluj</button>
      </div>

      <button type="button" id="btn-zatwierdz" class="btn-glowny">Zatwierdź</button>
    </section>

    <button type="button" id="btn-wstecz" class="btn-pomocniczy hidden">← Wstecz</button>
    <button type="button" id="btn-reset" class="btn-pomocniczy hidden">Nowy ruch</button>

    <div id="sukces-overlay" class="sukces-overlay hidden">
      <div class="sukces-box">
        <div class="sukces-ikona">✓</div>
        <p id="sukces-tekst"></p>
        <p class="sukces-hint">Dotknij, aby kontynuować</p>
      </div>
    </div>
  </main>

  <script src="karta-produktu.js"></script>
  <script src="kreator.js"></script>
  <script src="ruch.js"></script>
</body>
</html>
